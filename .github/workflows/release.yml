name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without v prefix, e.g. 1.0.0)'
        required: true

permissions:
  contents: write

env:
  XCODE_VERSION: '16.0'
  APP_NAME: MacAudio
  DRIVER_NAME: MacAudioDriver

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Extract version from tag or workflow_dispatch input ───
      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      # ── Setup ─────────────────────────────────────────────────
      - name: Select Xcode
        run: |
          XCODE_PATH="/Applications/Xcode_${{ env.XCODE_VERSION }}.app"
          if [ ! -d "$XCODE_PATH" ]; then
            echo "::error::Xcode ${{ env.XCODE_VERSION }} not found. Available:"
            ls /Applications/ | grep Xcode
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH"

      - name: Install xcodegen
        run: brew install xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1

      - name: Generate Xcode project
        run: xcodegen generate

      # ── Fix xcodegen damage ───────────────────────────────────
      - name: Restore entitlements
        run: |
          cat > MacAudio/MacAudio.entitlements << 'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.device.audio-input</key>
              <true/>
          </dict>
          </plist>
          ENTITLEMENTS

      - name: Restore driver Info.plist CFBundleExecutable
        run: |
          /usr/libexec/PlistBuddy -c "Add :CFBundleExecutable string '\$(EXECUTABLE_NAME)'" \
            MacAudioDriver/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable '\$(EXECUTABLE_NAME)'" \
            MacAudioDriver/Info.plist

      # ── Import signing certificates ───────────────────────────
      - name: Import certificates
        env:
          APPLICATION_CERT_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT }}
          INSTALLER_CERT_BASE64: ${{ secrets.DEVELOPER_ID_INSTALLER_CERT }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Download and import Apple WWDR intermediate certificates
          # Required for Developer ID certificate chain validation
          curl -sfL https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer \
            -o "$RUNNER_TEMP/DeveloperIDG2CA.cer"
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign

          curl -sfL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer \
            -o "$RUNNER_TEMP/AppleWWDRCAG3.cer"
          security import "$RUNNER_TEMP/AppleWWDRCAG3.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign

          # Import Application certificate
          APP_CERT_PATH="$RUNNER_TEMP/app_cert.p12"
          echo "$APPLICATION_CERT_BASE64" | base64 --decode > "$APP_CERT_PATH"
          security import "$APP_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          # Import Installer certificate
          INST_CERT_PATH="$RUNNER_TEMP/inst_cert.p12"
          echo "$INSTALLER_CERT_BASE64" | base64 --decode > "$INST_CERT_PATH"
          security import "$INST_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          # Allow codesign/productsign to access keychain without prompt
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Set keychain search list — temp keychain first, then system defaults
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Save keychain path for cleanup
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      # ── Build (universal binary) ──────────────────────────────
      - name: Build driver
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          xcodebuild -project MacAudio.xcodeproj \
            -target MacAudioDriver \
            -configuration Release \
            clean build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$VERSION" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH --timestamp"

      - name: Build app
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          xcodebuild -project MacAudio.xcodeproj \
            -target MacAudio \
            -configuration Release \
            build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$VERSION" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH --timestamp"

      - name: Verify code signatures
        run: |
          codesign -dvv build/Release/MacAudio.app
          codesign -dvv build/Release/MacAudioDriver.driver

      # ── Package ───────────────────────────────────────────────
      - name: Create component packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="$RUNNER_TEMP/pkg_staging"
          mkdir -p "$STAGING"

          # App component package (with pre-install to stop running app)
          pkgbuild \
            --component build/Release/MacAudio.app \
            --install-location /Applications \
            --scripts packaging/scripts/app \
            --version "$VERSION" \
            --identifier com.macaudio.app.pkg \
            "$STAGING/MacAudioApp.pkg"

          # Driver component package (with pre/post install scripts)
          pkgbuild \
            --component build/Release/MacAudioDriver.driver \
            --install-location "/Library/Audio/Plug-Ins/HAL" \
            --scripts packaging/scripts/driver \
            --version "$VERSION" \
            --identifier com.macaudio.driver.pkg \
            "$STAGING/MacAudioDriver.pkg"

      - name: Build product archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="$RUNNER_TEMP/pkg_staging"

          productbuild \
            --distribution packaging/distribution.xml \
            --resources packaging/resources \
            --package-path "$STAGING" \
            --version "$VERSION" \
            "$RUNNER_TEMP/MacAudio-unsigned.pkg"

      - name: Sign installer package
        run: |
          productsign \
            --sign "Developer ID Installer" \
            --keychain "$KEYCHAIN_PATH" \
            "$RUNNER_TEMP/MacAudio-unsigned.pkg" \
            "$RUNNER_TEMP/MacAudio-${{ steps.version.outputs.version }}.pkg"

          # Verify
          pkgutil --check-signature "$RUNNER_TEMP/MacAudio-${{ steps.version.outputs.version }}.pkg"

      # ── DMG ───────────────────────────────────────────────────
      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_STAGING="$RUNNER_TEMP/dmg_staging"
          mkdir -p "$DMG_STAGING"

          cp "$RUNNER_TEMP/MacAudio-$VERSION.pkg" "$DMG_STAGING/"
          cp packaging/resources/uninstall.sh "$DMG_STAGING/Uninstall MacAudio.command"
          chmod +x "$DMG_STAGING/Uninstall MacAudio.command"

          hdiutil create \
            -volname "MacAudio $VERSION" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDZO \
            "$RUNNER_TEMP/MacAudio-$VERSION.dmg"

      # ── Notarize ──────────────────────────────────────────────
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ./packaging/scripts/notarize.sh \
            "$RUNNER_TEMP/MacAudio-$VERSION.dmg" \
            "$APPLE_ID" \
            "$APPLE_ID_PASSWORD" \
            "$APPLE_TEAM_ID"

      - name: Notarize pkg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ./packaging/scripts/notarize.sh \
            "$RUNNER_TEMP/MacAudio-$VERSION.pkg" \
            "$APPLE_ID" \
            "$APPLE_ID_PASSWORD" \
            "$APPLE_TEAM_ID"

      # ── Release ───────────────────────────────────────────────
      - name: Generate checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd "$RUNNER_TEMP"
          shasum -a 256 "MacAudio-$VERSION.dmg" "MacAudio-$VERSION.pkg" \
            | tee "MacAudio-$VERSION-SHA256SUMS.txt"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          gh release delete "$TAG" --yes 2>/dev/null || true

          gh release create "$TAG" \
            "$RUNNER_TEMP/MacAudio-$VERSION.dmg" \
            "$RUNNER_TEMP/MacAudio-$VERSION.pkg" \
            "$RUNNER_TEMP/MacAudio-$VERSION-SHA256SUMS.txt" \
            --title "MacAudio $VERSION" \
            --generate-notes

      # ── Cleanup ───────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
          rm -f "$RUNNER_TEMP"/*.p12 "$RUNNER_TEMP"/*.cer 2>/dev/null || true
