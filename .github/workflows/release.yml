name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  XCODE_VERSION: '16.0'
  APP_NAME: MacAudio
  DRIVER_NAME: MacAudioDriver

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Extract version from tag ──────────────────────────────
      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      # ── Setup ─────────────────────────────────────────────────
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # ── Fix xcodegen damage ───────────────────────────────────
      - name: Restore entitlements
        run: |
          cat > MacAudio/MacAudio.entitlements << 'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.device.audio-input</key>
              <true/>
          </dict>
          </plist>
          ENTITLEMENTS

      - name: Restore driver Info.plist CFBundleExecutable
        run: |
          /usr/libexec/PlistBuddy -c "Add :CFBundleExecutable string '\$(EXECUTABLE_NAME)'" \
            MacAudioDriver/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable '\$(EXECUTABLE_NAME)'" \
            MacAudioDriver/Info.plist

      - name: Inject version into plists
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for plist in MacAudio/Info.plist MacAudioDriver/Info.plist; do
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$plist"
          done

      # ── Import signing certificates ───────────────────────────
      - name: Import certificates
        env:
          APPLICATION_CERT_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT }}
          INSTALLER_CERT_BASE64: ${{ secrets.DEVELOPER_ID_INSTALLER_CERT }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Download and import Apple WWDR intermediate certificates
          # Required for Developer ID certificate chain validation
          curl -sL https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer \
            -o "$RUNNER_TEMP/DeveloperIDG2CA.cer"
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign

          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer \
            -o "$RUNNER_TEMP/AppleWWDRCAG3.cer"
          security import "$RUNNER_TEMP/AppleWWDRCAG3.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign

          # Import Application certificate
          APP_CERT_PATH="$RUNNER_TEMP/app_cert.p12"
          echo "$APPLICATION_CERT_BASE64" | base64 --decode > "$APP_CERT_PATH"
          security import "$APP_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          # Import Installer certificate
          INST_CERT_PATH="$RUNNER_TEMP/inst_cert.p12"
          echo "$INSTALLER_CERT_BASE64" | base64 --decode > "$INST_CERT_PATH"
          security import "$INST_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          # Allow codesign/productsign to access keychain without prompt
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Set keychain search list — temp keychain first, then system defaults
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Debug: verify certs are found
          echo "=== Signing identities in keychain ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "=== Keychain search list ==="
          security list-keychains -d user

          # Save keychain path for cleanup
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      # ── Build ─────────────────────────────────────────────────
      - name: Build driver
        run: |
          xcodebuild -project MacAudio.xcodeproj \
            -target MacAudioDriver \
            -configuration Release \
            clean build \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Build app
        run: |
          xcodebuild -project MacAudio.xcodeproj \
            -target MacAudio \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Verify code signatures
        run: |
          codesign -dvv build/Release/MacAudio.app
          codesign -dvv build/Release/MacAudioDriver.driver

      # ── Package ───────────────────────────────────────────────
      - name: Create component packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="$RUNNER_TEMP/pkg_staging"
          mkdir -p "$STAGING"

          # App component package
          pkgbuild \
            --root build/Release/MacAudio.app \
            --install-location /Applications/MacAudio.app \
            --component-plist <(echo '<?xml version="1.0" encoding="UTF-8"?>
              <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
              <plist version="1.0"><array><dict>
                <key>BundleIsRelocatable</key><false/>
                <key>BundleOverwriteAction</key><string>upgrade</string>
              </dict></array></plist>') \
            --version "$VERSION" \
            --identifier com.macaudio.app.pkg \
            "$STAGING/MacAudioApp.pkg"

          # Driver component package (with pre/post install scripts)
          pkgbuild \
            --root build/Release/MacAudioDriver.driver \
            --install-location "/Library/Audio/Plug-Ins/HAL/MacAudioDriver.driver" \
            --scripts packaging/scripts \
            --version "$VERSION" \
            --identifier com.macaudio.driver.pkg \
            "$STAGING/MacAudioDriver.pkg"

      - name: Build product archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="$RUNNER_TEMP/pkg_staging"

          productbuild \
            --distribution packaging/distribution.xml \
            --resources packaging/resources \
            --package-path "$STAGING" \
            --version "$VERSION" \
            "$RUNNER_TEMP/MacAudio-unsigned.pkg"

      - name: Sign installer package
        run: |
          productsign \
            --sign "Developer ID Installer" \
            --keychain "$KEYCHAIN_PATH" \
            "$RUNNER_TEMP/MacAudio-unsigned.pkg" \
            "$RUNNER_TEMP/MacAudio-${{ steps.version.outputs.version }}.pkg"

          # Verify
          pkgutil --check-signature "$RUNNER_TEMP/MacAudio-${{ steps.version.outputs.version }}.pkg"

      # ── DMG ───────────────────────────────────────────────────
      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_STAGING="$RUNNER_TEMP/dmg_staging"
          mkdir -p "$DMG_STAGING"

          cp "$RUNNER_TEMP/MacAudio-$VERSION.pkg" "$DMG_STAGING/"

          hdiutil create \
            -volname "MacAudio $VERSION" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDZO \
            "$RUNNER_TEMP/MacAudio-$VERSION.dmg"

      # ── Notarize ──────────────────────────────────────────────
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          xcrun notarytool submit \
            "$RUNNER_TEMP/MacAudio-$VERSION.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$RUNNER_TEMP/MacAudio-$VERSION.dmg"

      - name: Notarize pkg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          xcrun notarytool submit \
            "$RUNNER_TEMP/MacAudio-$VERSION.pkg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$RUNNER_TEMP/MacAudio-$VERSION.pkg"

      # ── Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          gh release create "$TAG" \
            "$RUNNER_TEMP/MacAudio-$VERSION.dmg" \
            "$RUNNER_TEMP/MacAudio-$VERSION.pkg" \
            --title "MacAudio $VERSION" \
            --generate-notes

      # ── Cleanup ───────────────────────────────────────────────
      - name: Delete temporary keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
